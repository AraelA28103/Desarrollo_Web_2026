<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título del documento -->
    <title>Pinterest</title>
    <!-- Estilos CSS personalizado -->
    <link rel="stylesheet" href="static/css/style.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="flex-container d-flex v-100 vh-100 overflow-hidden">
        <div class="right-page-container flex-grow-1 overflow-y-auto">
            <header class="sticky-top bg-white">
                <nav class="navbar p-2 sticky-top border-bottom bg-white d-flex align-items-center flex-nowrap">
                    <div class="collapse d-md-flex flex-grow-1" id="searchBar">
                        <form id="buscador-principal" class="flex-grow-1" role="search">
                            <input class="form-control me-2" type="search" placeholder="Buscar" aria-label="Search" />
                        </form>
                    </div>

                    <ul id="botones-nav" class="list-unstyled d-flex align-items-center mb-0 ms-auto gap-2">
                        <li class="d-md-none">
                            <button class="custom-btn" type="button" data-bs-toggle="collapse"
                                data-bs-target="#searchBar">
                                <i class="bi bi-search h4"></i>
                            </button>
                        </li>
                        <li class="position-relative">
                            <button class="custom-btn"><i class="bi bi-person-circle h2"></i></button>
                            <span class="custom-tooltip tooltip-bottom shadow">Tu perfil</span>
                        </li>
                        <li>
                            <button class="custom-btn2"><i class="bi bi-chevron-down"></i></button>
                        </li>
                    </ul>
                </nav>
                <nav id="secondary-nav" class="navbar border-bottom bg-white py-0 position-relative">
                    <div class="container-fluid d-flex align-items-center px-4">
                        <div id="tag-scroll"
                            class="d-flex justify-content-start gap-4 overflow-x-auto no-scrollbar flex-nowrap flex-grow-1">
                            <a href="#" class="nav2-link active">Todos</a>
                            <a href="#" class="nav2-link">Arquitectura</a>
                            <a href="#" class="nav2-link">Diseño</a>
                            <a href="#" class="nav2-link">Naturaleza</a>
                            <a href="#" class="nav2-link">Fotografía</a>
                            <a href="#" class="nav2-link">Moda</a>
                            <a href="#" class="nav2-link">Arte</a>
                        </div>
                    </div>
                </nav>
            </header>
            <main class="col-lg-11 p-4">
                <div style="height: 2000px;">
                    <!-- Tarjeta imagen 1 -->
                    <div class="custom-card card border-0" style="width: 15rem;">
                        <!-- Contenedor con la clase trigger para el hover -->
                        <div class="contenedor-img position-relative overflow-hidden">
                            <img src="static/images/gato1.jpg" class="card-img-top" alt="Gato">

                            <!-- Capa de Hover -->
                            <div class="overlay-botones d-flex flex-column justify-content-between align-items-end p-3">
                                <button class="btn btn-danger btn-sm fw-bold px-3 btn-custom-radius btn-hover-efecto">
                                    Guardar
                                </button>

                                <button class="btn btn-light btn-sm px-2 btn-custom-radius shadow-sm">
                                    <i class="bi bi-box-arrow-up"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Pie de tarjeta -->
                        <div class="card-body d-flex justify-content-end p-0">
                            <a href="#" class="btn btn-link text-dark shadow-none">
                                <i class="bi bi-three-dots"></i>
                            </a>
                        </div>
                    </div>


                </div>
            </main>
        </div>
        <aside class="order-first border-end border-1">
            <div class="aside-container d-flex flex-column vh-100">
                <ul class="list-unstyled d-flex flex-column">
                    <li class="text-center position-relative group-hover">
                        <button class="custom-btn m-2">
                            <i class="bi bi-pinterest h4 text-danger"></i>
                        </button>
                        <span class="custom-tooltip tooltip-right shadow">
                            Inicio
                        </span>
                    </li>
                    <li class="text-center position-relative group-hover">
                        <button class="custom-btn m-2">
                            <i class="bi bi-house h4"></i>
                        </button>
                        <span class="custom-tooltip tooltip-right shadow">
                            Inicio
                        </span>
                    </li>

                    <li class="text-center position-relative group-hover">
                        <button class="custom-btn m-2">
                            <i class="bi bi-compass h4"></i>
                        </button>
                        <span class="custom-tooltip tooltip-right shadow">
                            Explorar
                        </span>
                    </li>
                    <li class="text-center position-relative group-hover">
                        <button class="custom-btn m-2">
                            <i class="bi bi-columns h4"></i>
                        </button>
                        <span class="custom-tooltip tooltip-right shadow">
                            Tus tableros
                        </span>
                    </li>
                    <li class="text-center position-relative group-hover">
                        <button class="custom-btn m-2">
                            <i class="bi bi-plus-square h4"></i>
                        </button>
                        <span class="custom-tooltip tooltip-right shadow">
                            Crear
                        </span>
                    </li>
                    <li class="text-center position-relative group-hover">
                        <button class="custom-btn m-2">
                            <i class="bi bi-bell h4"></i>
                        </button>
                        <span class="custom-tooltip tooltip-right shadow">
                            Actualizaciones
                        </span>
                    </li>
                    <li class="text-center position-relative group-hover">
                        <button class="custom-btn m-2">
                            <i class="bi bi-chat-dots h4"></i>
                        </button>
                        <span class="custom-tooltip tooltip-right shadow">
                            Mensajes
                        </span>
                    </li>
                </ul>
                <ul class="list-unstyled mt-auto">
                    <li class="text-center position-relative group-hover">
                        <button class="custom-btn m-2">
                            <i class="bi bi-gear h4"></i>
                        </button>
                        <span class="custom-tooltip tooltip-right shadow">
                            Configuración y soporte
                        </span>
                    </li>
                </ul>
            </div>
        </aside>
    </div>


    <!-- Script JS -->
    <script src="static/js/script.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net"></script>
</body>


</html>
