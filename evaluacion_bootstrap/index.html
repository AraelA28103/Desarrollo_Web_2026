<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Bootstrap</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<nav>
    <div class="nav-container d-flex justify-content-between p-3">
        <div class="nav-izq d-flex align-items-center gap-2">
            <button class="custom-btn"><i class="bi bi-list"></i></button>
            <div class="logo d-flex gap-2 align-content-center">
                <img src="static/images/logo_classroom.svg" alt="Servidor no disponible">
                <a href="#">Classroom</a>
            </div>
        </div>
        <div class="nav-der d-flex gap-2">
            <button class="custom-btn"><i class="bi bi-plus-lg"></i></button>
            <button class="custom-btn"><i class="bi bi-grid-3x3-gap"></i></button>
            <button class="custom-btn"><i class="bi bi-person-circle"></i></button>
        </div>
    </div>
</nav>
<div class="d-flex container-fluid p-0">
    <aside class="col-3 vh-100">
        <div class="aside-container p-3">
            <ul class="list-unstyled">
                <li>
                    <button class="aside-btn d-flex align-items-center gap-3 p-3">
                        <i class="bi bi-house-door"></i>
                        <span>Inicio</span>
                    </button>
                </li>
                <li>
                    <button class="aside-btn d-flex align-items-center gap-3 p-3">
                        <i class="bi bi-calendar"></i>
                        <span>Calendario</span>
                    </button>
                </li>
                <li>
                    <button class="aside-btn d-flex align-items-center gap-3 p-3">
                        <i class="bi bi-book"></i>
                        <span>Recursos</span>
                    </button>
                </li>
            </ul>
            <ul class="list-unstyled">
                <li>
                    <button class="aside-btn d-flex align-items-center gap-3 p-3">
                        <i class="bi bi-backpack"></i>
                        <span>Cursos a los que te has ...</span>
                        <i class="bi bi-chevron-down"></i>
                    </button>
                </li>
            </ul>
            <ul class="list-unstyled">
                <li>
                    <button class="aside-btn d-flex align-items-center gap-3 p-3">
                        <i class="bi bi-arrow-down-square"></i>
                        <span>Clases archivadas</span>
                    </button>
                </li>
                <li>
                    <button class="aside-btn d-flex align-items-center gap-3 p-3">
                        <i class="bi bi-gear"></i>
                        <span>Ajustes</span>
                    </button>
                </li>
            </ul>
        </div>
    </aside>
    <main class="col-10 vh-100">
        <div class="main-container p-4">
            <button class="card" style="width: 20rem;">
                <div class="card-header p-0">
                <img src="static/images/imagen_aula.jpg" class="card-img-top" alt="Servidor no disponible">
                </div>
                <div class="card-body"></div>
                <div class="card-footer">
                    <div class="card-buttons d-flex justify-content-end">
                        <button class="custom-btn">
                            <i class="bi bi-person-square"></i>
                        </button>
                        <button class="custom-btn">
                            <i class="bi bi-folder-fill"></i>
                        </button>
                        <button class="custom-btn">
                            <i class="bi bi-three-dots-vertical"></i>
                        </button>
                    </div>
                </div>
            </button>
        </div>
    </main>
</div>

<body>

</body>

</html>
