<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Autor del documento -->
    <meta name="author" content="araelanabalon@liceovvh.cl">
    <!-- Título del documento -->
    <title>01 Repaso HTML - CSS</title>
    <!-- Estilos CSS -->
    <link rel="stylesheet" href="static/css/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Conteendor -->
    <div class="container">
        <!-- Contenido del contenedor -->
        <div class="container-content">
            <!-- Cabezera -->
            <header>
                <h1>Website Title</h1>
            </header>
            <!-- Contenido de pagina -->
            <div class="page-content">
                <!-- Contenido principal de la pagina -->
                <main>
                    <!-- Barra azul -->
                    <aside>
                        <!-- Contenedor de botones -->
                        <div class="aside-btn">
                            <button>Button 1</button>
                            <button>Button 2</button>
                        </div>
                    </aside>
                    <!-- Seccion principal -->
                    <section>
                        <!-- Contenedor rojo -->
                        <div class="red-container">
                            <!-- Contenido del contenedor rojo -->
                            <div class="rcontainer-content">
                                <!-- Fila 1 -->
                                <div class="row1">
                                    <!-- Caja amarilla -->
                                    <div class="ybox"></div>
                                    <!-- Caja amarilla -->
                                    <div class="ybox"></div>
                                    <!-- Caja amarilla -->
                                    <div class="ybox"></div>
                                </div>
                                <!-- Fila 2 -->
                                <div class="row2">
                                    <button>Learn More</button>
                                </div>
                            </div>

                        </div>
                        <!-- Fila de textos -->
                        <div class="text-box">
                            <!-- Texto -->
                            <div class="text"></div>
                            <!-- Texto -->
                            <div class="text"></div>
                            <!-- Texto pequeño -->
                            <div class="text2"></div>
                        </div>
                    </section>
                </main>
            </div>

        </div>

    </div>
</body>

</html>
